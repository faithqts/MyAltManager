name: Tag and Release from TOC

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Metadata from TOC
        id: meta
        run: |
          set -euo pipefail
          FILE=$(ls *.toc | head -n1)

          VERSION=$(grep -i "^## Version:" "$FILE" | awk -F': ' '{print $2}' | tr -d '\r')
          TITLE=$(grep -i "^## Title:" "$FILE" | awk -F': ' '{print $2}' | tr -d '\r')
          PROJECT_NAME=$(basename "$FILE" .toc)

          SAFE_NAME=$(echo "$TITLE" | tr -d ' ')
          DATE=$(date +%F)
          PACKAGE_DIR="$RUNNER_TEMP/package"
          ARCHIVE_PATH="$PACKAGE_DIR/${SAFE_NAME}-${VERSION}.zip"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "project_name=$PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "safe_name=$SAFE_NAME" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT
          echo "package_dir=$PACKAGE_DIR" >> $GITHUB_OUTPUT
          echo "archive_path=$ARCHIVE_PATH" >> $GITHUB_OUTPUT

      - name: Ensure Tag and Determine Release Mode
        id: release_gate
        run: |
          set -euo pipefail
          TAG="v${{ steps.meta.outputs.version }}"
          SHOULD_RELEASE="false"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            if [[ "${GITHUB_REF_NAME}" != "$TAG" ]]; then
              echo "::error::Tag ${GITHUB_REF_NAME} does not match TOC version ${TAG}."
              exit 1
            fi
            SHOULD_RELEASE="true"
          else
            git fetch --tags
            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists; skipping release creation."
            else
              git config user.name "github-actions"
              git config user.email "actions@github.com"
              git tag "$TAG"
              git push origin "$TAG"
              SHOULD_RELEASE="true"
            fi
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "should_release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT

      - name: Exit Early (No New Release)
        if: steps.release_gate.outputs.should_release != 'true'
        run: echo "No new release required for this push."

      - name: Checkout Tagged Commit
        if: steps.release_gate.outputs.should_release == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release_gate.outputs.tag }}
          fetch-depth: 0

      - name: Prepare Package Contents
        if: steps.release_gate.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          PACKAGE_DIR="${{ steps.meta.outputs.package_dir }}"
          PROJECT_NAME="${{ steps.meta.outputs.project_name }}"

          rm -rf "$PACKAGE_DIR"
          mkdir -p "$PACKAGE_DIR/$PROJECT_NAME"

          rsync -a \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.vscode/' \
            --exclude 'references/' \
            --exclude 'node_modules/' \
            --exclude '.gitignore' \
            --exclude '.editorconfig' \
            --exclude 'README.md' \
            . "$PACKAGE_DIR/$PROJECT_NAME/"

      - name: Create Zip
        if: steps.release_gate.outputs.should_release == 'true'
        uses: thedoctor0/zip-release@0.7.5
        with:
          type: zip
          directory: "${{ steps.meta.outputs.package_dir }}"
          path: "${{ steps.meta.outputs.project_name }}"
          filename: "${{ steps.meta.outputs.safe_name }}-${{ steps.meta.outputs.version }}.zip"

      - name: Generate Release Notes
        if: steps.release_gate.outputs.should_release == 'true'
        id: notes
        run: |
          set -euo pipefail
          TAG="${{ steps.release_gate.outputs.tag }}"
          EVENT_BEFORE="${{ github.event.before }}"
          EVENT_SHA="${{ github.sha }}"
          RANGE=""
          NOTES=""

          if [[ -n "$EVENT_BEFORE" ]] && [[ "$EVENT_BEFORE" != "0000000000000000000000000000000000000000" ]] && git rev-parse "$EVENT_BEFORE" >/dev/null 2>&1; then
            RANGE="$EVENT_BEFORE..$EVENT_SHA"
          fi

          if [[ -z "$RANGE" ]]; then
            PREVIOUS_TAG=$(git tag --sort=-creatordate | grep -Fxv "$TAG" | head -n1 || true)
            if [[ -n "$PREVIOUS_TAG" ]]; then
              RANGE="$PREVIOUS_TAG..$TAG"
            else
              RANGE="$TAG"
            fi
          fi

          # Prefer explicit Release Notes bullets in commit bodies:
          # Release Notes:
          # - Updated X
          # - Updated Y
          NOTES=$(git log --no-merges --format=%B "$RANGE" | awk '
            /^Release Notes:[[:space:]]*$/ { in_notes=1; next }
            in_notes && /^- / { print; next }
            in_notes && /^$/ { in_notes=0; next }
            in_notes && !/^- / { in_notes=0 }
          ' || true)

          if [[ -z "$NOTES" ]]; then
            if [[ "$RANGE" == "$TAG" ]]; then
              NOTES=$(git log --no-merges --pretty=format:'- %s' "$TAG" -n 20 || true)
            else
              NOTES=$(git log --no-merges --pretty=format:'- %s' "$RANGE" || true)
            fi
          fi

          if [[ -z "$NOTES" ]]; then
            NOTES="- Maintenance release."
          fi

          DISCORD_NOTES="$NOTES"
          if (( ${#DISCORD_NOTES} > 950 )); then
            DISCORD_NOTES="${DISCORD_NOTES:0:947}..."
          fi

          {
            echo "release_notes<<EOF"
            echo "$NOTES"
            echo "EOF"
            echo "discord_notes<<EOF"
            echo "$DISCORD_NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.release_gate.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ steps.meta.outputs.title }} (${{ steps.meta.outputs.version }}) - ${{ steps.meta.outputs.date }}"
          tag_name: ${{ steps.release_gate.outputs.tag }}
          files: "${{ steps.meta.outputs.archive_path }}"
          body: "${{ steps.notes.outputs.release_notes }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send Discord Webhook
        if: steps.release_gate.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          PROJECT_NAME="${{ steps.meta.outputs.project_name }}"
          VERSION="${{ steps.meta.outputs.version }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.release_gate.outputs.tag }}/${{ steps.meta.outputs.safe_name }}-${VERSION}.zip"
          RELEASE_NOTES="${{ steps.notes.outputs.discord_notes }}"
          UNIX_TIMESTAMP=$(date +%s)

          PAYLOAD=$(jq -n \
            --arg project_name "$PROJECT_NAME" \
            --arg release_date "<t:${UNIX_TIMESTAMP}:f>" \
            --arg version "$VERSION" \
            --arg download_url "$DOWNLOAD_URL" \
            --arg release_notes "$RELEASE_NOTES" \
            --arg thumbnail_url "https://images-ext-1.discordapp.net/external/dNfKZzz14vEYMPJJ639InbANT6KXuygF3N_MzNvSo7k/https/cscdn.support.blizzard.com/maintenance-icons/WoWMidnight.png?format=webp&quality=lossless&width=150&height=150" \
            '{
              content: null,
              embeds: [
                {
                  description: ("A new release for " + $project_name + " has been pushed to GitHub."),
                  color: 19387,
                  fields: [
                    {
                      name: "Release Date",
                      value: $release_date,
                      inline: true
                    },
                    {
                      name: "Version",
                      value: $version,
                      inline: true
                    },
                    {
                      name: "Download",
                      value: ("[Here](" + $download_url + ")"),
                      inline: true
                    },
                    {
                      name: "Release Notes",
                      value: $release_notes,
                      inline: false
                    }
                  ],
                  author: {
                    name: $project_name
                  },
                  thumbnail: {
                    url: $thumbnail_url
                  }
                }
              ],
              username: "GitHub",
              avatar_url: "https://upload.wikimedia.org/wikipedia/commons/9/91/Octicons-mark-github.svg",
              attachments: []
            }')

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "$PAYLOAD" \
          "${{ secrets.DISCORD_WEBHOOK_URL }}"
